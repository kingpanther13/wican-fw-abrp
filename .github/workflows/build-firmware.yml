name: Build WiCan Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hardware:
          - name: obd
            ver_define: WICAN_V300
            cmake_flag: "-DHARDWARE_VER=2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ESP-IDF Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32c3
          path: '.'

      - name: Rename artifacts
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          TAG_CLEAN="${TAG#v}"
          cp build/*.bin "wican-fw_${{ matrix.hardware.name }}_v${TAG_CLEAN}.bin"
          cp build/*.bin firmware.bin
          # Create a zip with the bin
          zip "wican-fw_${{ matrix.hardware.name }}_v${TAG_CLEAN}.zip" firmware.bin
          rm firmware.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wican-fw-${{ matrix.hardware.name }}
          path: |
            wican-fw_*.bin
            wican-fw_*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wican-fw_*.bin
            wican-fw_*.zip
          generate_release_notes: true
